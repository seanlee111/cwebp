# Build the Vite static bundle and deploy it to GitHub Pages
# on every push to main. The site lives at
# https://seanlee111.github.io/cwebp/
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Needed by actions/deploy-pages@v4 to publish via OIDC
permissions:
  contents: read
  pages: write
  id-token: write

# Allow at most one concurrent deployment; later runs cancel older ones
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build (pages base)
        run: npm run build:pages

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
